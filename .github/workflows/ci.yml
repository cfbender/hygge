name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  ci:
    name: ci (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # TODO: windows-latest dropped — mise-action on Windows runners is
        # experimental and has known PATH/shim issues that make it unreliable
        # in CI. Re-add once mise Windows support stabilises.
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up mise (installs Go toolchain)
        uses: jdx/mise-action@v4
        with:
          cache: true
          github_token: ${{ github.token }}

      - name: Download modules
        run: go mod download

      - name: Lint
        if: matrix.os == 'ubuntu-latest'
        run: mise run lint

      - name: Test
        run: mise run test

      - name: Build
        run: mise run build
