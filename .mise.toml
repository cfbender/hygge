[tools]
git-cliff = "latest"
go = "1.26"
golangci-lint = "2"
staticcheck = "2026.1"

[tasks.build]
description = "Compile the hygge binary to ./bin/hygge"
run = "go build -o ./bin/hygge ./cmd/hygge"

[tasks.test]
description = "Run all tests with race detector"
run = "go test ./... -race -count=1"

[tasks.lint]
description = "Run golangci-lint"
run = "golangci-lint run"

[tasks.tidy]
description = "Tidy go modules"
run = "go mod tidy"

[tasks.clean]
description = "Remove build artifacts and coverage output"
run = "rm -rf ./bin ./coverage.out"

[tasks.cli]
description = "Build and run the hygge binary (pass args after --)"
run = ["mise run build", "./bin/hygge $@"]

[tasks.precommit]
description = "All final checks before committing code"
run = ["mise run fix", "mise run lint", "mise run test", "mise run build", "staticcheck ./..."]

[tasks.fix]
description = "Run linters with auto-fix enabled"
run = "go fix ./..."

[tasks.release]
description = "Generate release for the next major/minor/patch version"
usage = '''
arg "<part>" help="Version part to bump" {
  choices "major" "minor" "patch"
}
'''
run = ["bash ./scripts/changelog.sh ${usage_part?}", "bash ./scripts/bump.sh ${usage_part?}"]
